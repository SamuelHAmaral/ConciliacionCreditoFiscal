# Compila la app portable de Windows y adjunta el ZIP a GitHub Releases (etiqueta v*).
# Prueba manual: Actions -> Release -> Ejecutar flujo de trabajo.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Obtener codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compilar ejecutable
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          ./scripts/build_exe.ps1

      - name: Empaquetar ZIP
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "snapshot" }
          ./scripts/package_release.ps1 -Version $version

      - name: Subir artefacto del flujo
        uses: actions/upload-artifact@v4
        with:
          name: ConciliacionCreditoFiscal-Windows-x64
          path: dist/ConciliacionCreditoFiscal-Windows-x64-*.zip
          if-no-files-found: error

      - name: Publicar release en GitHub
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ConciliacionCreditoFiscal-Windows-x64-*.zip
          generate_release_notes: true
